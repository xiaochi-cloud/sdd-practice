# 功能规范模板

> 复制此模板开始编写新功能规范

**使用说明：**
1. 复制模板到新文件
2. 填写 meta 信息
3. 定义 functions/parameters/returns
4. 添加 constraints 和 business_rules
5. 定义 acceptance_criteria

---

meta:
  id: FXXX                    # 功能 ID（如 F001）
  name: 功能名称               # 简洁的功能名称
  version: 1.0.0              # 规范版本
  description: |              # 功能描述（1-2 句话）
    功能详细说明
  priority: high              # 优先级：high/medium/low
  author: 作者名               # 规范作者
  created_at: 2026-03-11      # 创建日期

spec:
  functions:
    - id: FXXX-01             # 子功能 ID
      name: 子功能名称         # 子功能名称
      description: |          # 子功能详细描述
        详细描述子功能的用途和场景
      
      # ==================== 参数定义 ====================
      parameters:
        - name: 参数名
          type: string        # 类型：string/number/boolean/enum/object/array
          min_length: 1       # 最小长度（string）
          max_length: 200     # 最大长度（string）
          min_value: 0        # 最小值（number）
          max_value: 100      # 最大值（number）
          pattern: "^..."     # 正则表达式（string）
          format: email       # 格式：email/uuid/date/datetime
          values: [a, b, c]   # 枚举值（enum）
          required: true      # 是否必填
          default: value      # 默认值
          description: 参数描述
      
      # ==================== 返回值定义 ====================
      returns:
        - name: 返回值名
          type: string
          format: uuid
          description: 返回值描述
      
      # ==================== 错误定义 ====================
      errors:
        - code: ERROR_CODE
          description: 错误描述
          http_status: 400
      
      # ==================== 约束条件 ====================
      constraints:
        - 约束 1（如：参数不能为空）
        - 约束 2（如：长度限制）
        - 约束 3（如：格式要求）
      
      # ==================== 业务规则 ====================
      business_rules:
        - id: R001
          name: 规则名称
          description: 规则详细描述
          condition: 条件表达式
          action: 执行动作
      
      # ==================== 验收标准 ====================
      acceptance_criteria:
        - id: AC001
          description: 验收标准描述
          test: 测试方法或预期结果

